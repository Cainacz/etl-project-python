services:
  pipeline:
    build: .
    volumes:
      - ./data/database:/app/data/database
    command: python src/main.py
    environment:
      - PYTHONUNBUFFERED=1
  
  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
    environment:
      - JUPYTER_ENABLE_LAB=yes
    restart: unless-stopped